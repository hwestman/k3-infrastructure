---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-unifi-exporter
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  path: ./kubernetes/apps/monitoring/unifi-exporter/app
  wait: false
  postBuild:
    substitute: {}
