---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unifi-exporter-script
  namespace: monitoring
data:
  exporter.py: |
    #!/usr/bin/env python3
    import os
    import requests
    import time
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import urllib3
    urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

    class UnifiExporter:
        def __init__(self):
            import sys
            self.host = os.getenv('UNIFI_ADDR', 'unifi-controller.default.svc.cluster.local:8443')
            self.user = os.getenv('UNIFI_USER', 'admin')
            self.passwd = os.getenv('UNIFI_PASS', 'password')
            self.site = os.getenv('UNIFI_SITE', 'default')
            self.session = requests.Session()
            self.session.verify = False
            self.session.headers.update({
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            })
            print(f"[INIT] Unifi Exporter configured for {self.host} site={self.site} user={self.user}", file=sys.stderr, flush=True)

        def login(self):
            import sys
            try:
                url = f'https://{self.host}/api/auth/login'
                print(f"[LOGIN] Attempting login to {url}", file=sys.stderr, flush=True)
                resp = self.session.post(url, json={'username': self.user, 'password': self.passwd}, timeout=5)
                print(f"[LOGIN] Status code: {resp.status_code}", file=sys.stderr, flush=True)
                if resp.status_code != 200:
                    print(f"[LOGIN] Response text: {resp.text[:500]}", file=sys.stderr, flush=True)
                return resp.status_code == 200
            except Exception as e:
                print(f"[ERROR] Login failed: {type(e).__name__}: {e}", file=sys.stderr, flush=True)
                import traceback
                print(traceback.format_exc(), file=sys.stderr, flush=True)
                return False

        def get_stations(self):
            import sys
            try:
                url = f'https://{self.host}/api/s/{self.site}/stat/sta'
                print(f"[STATIONS] Fetching from {url}", file=sys.stderr, flush=True)
                resp = self.session.get(url, timeout=5)
                print(f"[STATIONS] Status code: {resp.status_code}", file=sys.stderr, flush=True)
                if resp.status_code != 200:
                    print(f"[STATIONS] Response text: {resp.text[:500]}", file=sys.stderr, flush=True)
                data = resp.json().get('data', [])
                print(f"[STATIONS] Found {len(data)} connected stations", file=sys.stderr, flush=True)
                return data
            except Exception as e:
                print(f"[ERROR] Get stations failed: {type(e).__name__}: {e}", file=sys.stderr, flush=True)
                import traceback
                print(traceback.format_exc(), file=sys.stderr, flush=True)
                return []

        def export_metrics(self):
            metrics = [
                '# HELP unifi_stations_received_bytes_total Total bytes received by connected stations',
                '# TYPE unifi_stations_received_bytes_total counter',
            ]

            self.login()
            for sta in self.get_stations():
                rx_bytes = sta.get('rx_bytes', 0)
                hostname = sta.get('hostname', sta.get('mac', 'unknown')).replace('-', '_').replace(':', '')
                metrics.append(f'unifi_stations_received_bytes_total{{host="{hostname}"}} {rx_bytes}')

            return '\n'.join(metrics)

    exporter = UnifiExporter()

    class MetricsHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            import sys
            if self.path == '/metrics':
                print(f"[METRICS] Scrape request from {self.client_address[0]}", file=sys.stderr, flush=True)
                self.send_response(200)
                self.send_header('Content-type', 'text/plain')
                self.end_headers()
                try:
                    metrics = exporter.export_metrics()
                    self.wfile.write(metrics.encode())
                except Exception as e:
                    print(f"[ERROR] export_metrics failed: {e}", file=sys.stderr, flush=True)
                    self.wfile.write(b"# Error exporting metrics\n")
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, format, *args):
            pass

    import sys
    print('[START] Testing connection to Unifi controller...', file=sys.stderr, flush=True)
    if exporter.login():
        print('[START] Connection test successful!', file=sys.stderr, flush=True)
        stations = exporter.get_stations()
        print(f'[START] Got {len(stations)} stations', file=sys.stderr, flush=True)
    else:
        print('[WARN] Connection test failed - metrics will be empty', file=sys.stderr, flush=True)

    server = HTTPServer(('0.0.0.0', 9130), MetricsHandler)
    print('Unifi Exporter listening on :9130', file=sys.stderr, flush=True)
    server.serve_forever()

---
apiVersion: v1
kind: Service
metadata:
  name: unifi-exporter
  namespace: monitoring
  labels:
    app: unifi-exporter
spec:
  ports:
    - name: metrics
      port: 9130
      targetPort: 9130
      protocol: TCP
  selector:
    app: unifi-exporter
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-exporter
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-exporter
  template:
    metadata:
      labels:
        app: unifi-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9130"
    spec:
      containers:
        - name: unifi-exporter
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash"]
          args:
            - -c
            - |
              pip install requests --quiet
              python /app/exporter.py
          ports:
            - name: metrics
              containerPort: 9130
          env:
            - name: UNIFI_ADDR
              value: "unifi-controller.default.svc.cluster.local:8443"
            - name: UNIFI_USER
              valueFrom:
                secretKeyRef:
                  name: unifi-exporter-secret
                  key: username
            - name: UNIFI_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-exporter-secret
                  key: password
            - name: UNIFI_SITE
              value: "default"
          volumeMounts:
            - name: script
              mountPath: /app
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: unifi-exporter-script
            defaultMode: 0755
