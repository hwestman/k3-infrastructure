---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unifi-exporter-config
  namespace: monitoring
data:
  config.yaml: |
    # Default settings for detecting Unifi Dream Machine / Unifi Protect
    # These should be read from somewhere in the controller's interface
    # For details, see: https://github.com/ndom91/unifi-exporter
    ---
    # Unifi Controller settings
    # These can also be set via environment variables for Docker/K8s:
    # UNIFI_HOST, UNIFI_PORT, UNIFI_USER, UNIFI_PASS, UNIFI_SITE, UNIFI_VERIFY_SSL

---
apiVersion: v1
kind: Service
metadata:
  name: unifi-exporter
  namespace: monitoring
  labels:
    app: unifi-exporter
spec:
  ports:
    - name: metrics
      port: 9130
      targetPort: 9130
      protocol: TCP
  selector:
    app: unifi-exporter
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-exporter
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-exporter
  template:
    metadata:
      labels:
        app: unifi-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9130"
    spec:
      containers:
        - name: unifi-exporter
          image: docker.io/erisamoe/prometheus-unifi-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9130
          env:
            - name: UNIFI_ADDR
              value: "unifi-controller.default.svc.cluster.local:8443"
            - name: UNIFI_USER
              valueFrom:
                secretKeyRef:
                  name: unifi-exporter-secret
                  key: username
            - name: UNIFI_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-exporter-secret
                  key: password
            - name: UNIFI_SITE
              value: "default"
            - name: UNIFI_INSECURE
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
