---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-snmp-exporter
  namespace: flux-system
spec:
  interval: 30m
  path: ./kubernetes/apps/monitoring/snmp-exporter
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  retryInterval: 1m
  timeout: 5m
