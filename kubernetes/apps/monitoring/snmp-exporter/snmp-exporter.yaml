---
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: monitoring
  labels:
    app: snmp-exporter
spec:
  ports:
    - name: http
      port: 9116
      targetPort: 9116
      protocol: TCP
  selector:
    app: snmp-exporter
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-conf
  namespace: monitoring
data:
  snmp.yml: |
    edgemax:
      walk:
        - 1.3.6.1.2.1.31.1.1.1.10
        - 1.3.6.1.2.1.31.1.1.1.6
      get:
        - 1.3.6.1.2.1.25.1.1.0
        - 1.3.6.1.2.1.25.2.2.0
        - 1.3.6.1.4.1.2021.11.11.0
        - 1.3.6.1.4.1.2021.4.11.0
        - 1.3.6.1.4.1.2021.4.15.0
        - 1.3.6.1.4.1.2021.4.5.0
      metrics:
        - name: hrSystemUptime
          oid: 1.3.6.1.2.1.25.1.1
          type: gauge
          help: The amount of time since this host was last initialized
        - name: hrMemorySize
          oid: 1.3.6.1.2.1.25.2.2
          type: gauge
          help: The amount of physical read-write main memory contained by the host
        - name: ifHCOutOctets
          oid: 1.3.6.1.2.1.31.1.1.1.10
          type: counter
          help: The total number of octets transmitted out of the interface
          indexes:
            - labelname: ifIndex
              type: gauge
        - name: ifHCInOctets
          oid: 1.3.6.1.2.1.31.1.1.1.6
          type: counter
          help: The total number of octets received on the interface
          indexes:
            - labelname: ifIndex
              type: gauge
        - name: ssCpuIdle
          oid: 1.3.6.1.4.1.2021.11.11
          type: gauge
          help: The percentage of processor time spent idle
        - name: memTotalFree
          oid: 1.3.6.1.4.1.2021.4.11
          type: gauge
          help: The total amount of memory free or available for use on this host
        - name: memCached
          oid: 1.3.6.1.4.1.2021.4.15
          type: gauge
          help: The total amount of real or virtual memory allocated for use as cached memory
        - name: memTotalReal
          oid: 1.3.6.1.4.1.2021.4.5
          type: gauge
          help: The total amount of real/physical memory installed on this host

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: snmp-exporter
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9116
          volumeMounts:
            - name: snmp-conf-volume
              mountPath: /etc/snmp_exporter
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: snmp-conf-volume
          configMap:
            name: snmp-conf
