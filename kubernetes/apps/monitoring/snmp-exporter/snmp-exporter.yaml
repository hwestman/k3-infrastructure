---
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: monitoring
  labels:
    app: snmp-exporter
spec:
  ports:
    - name: http
      port: 9116
      targetPort: 9116
      protocol: TCP
  selector:
    app: snmp-exporter
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-conf
  namespace: monitoring
data:
  snmp.yml: |
    ---
    edgemax:
      walk:
        - 1.3.6.1.2.1.1
        - 1.3.6.1.2.1.2
        - 1.3.6.1.2.1.25
      version: 2
      max_repetitions: 25
      timeout: 5s
      retries: 3
      auth:
        community: public

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: snmp-exporter
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9116
          volumeMounts:
            - name: snmp-conf-volume
              mountPath: /etc/snmp_exporter
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: snmp-conf-volume
          configMap:
            name: snmp-conf
